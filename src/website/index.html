<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Niko — Cozy Café Discord Bot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="styles.css" />

  <!-- SEO -->
  <meta name="description" content="Niko is a friendly, bilingual Discord bot with a cozy café vibe. Features include AI chat, music, leveling, moderation, community engagement, and more.">
  <meta name="keywords" content="discord bot, niko bot, cozy discord bot, cafe discord bot, bilingual discord bot, german discord bot, english discord bot, ai discord bot, music bot, leveling bot, moderation bot, fun discord bot, community bot, aesthetic discord bot, cafe aesthetic bot, lo-fi discord bot">

  <!-- Open Graph (Discord, Facebook, Reddit, etc.) -->
  <meta property="og:title" content="Niko — Cozy Café Discord Bot">
  <meta property="og:description" content="A warm, bilingual Discord bot with a cozy café vibe. Music, AI chat, leveling, moderation, and more.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://developer51709.github.io/Niko">
  <!-- <meta property="og:image" content="https://developer51709.github.io/Niko/og-image.png"> -->
  <meta property="og:site_name" content="Niko Bot">

  <!-- Twitter / X Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Niko — Cozy Café Discord Bot">
  <meta name="twitter:description" content="A warm, bilingual Discord bot with a cozy café vibe. Music, AI chat, leveling, moderation, and more.">
  <!-- <meta name="twitter:image" content="https://developer51709.github.io/Niko/og-image.png"> -->
  <!-- <meta name="twitter:creator" content="@developer51709"> -->

  <!-- Theme color for embeds -->
  <meta name="theme-color" content="#c58b6b">
</head>
<body class="page page--fade-in">
  <header class="header">
    <div class="header__left">
      <span class="logo">niko ☕</span>
    </div>
    <div class="header__right">
      <a href="docs/index.html" class="btn btn--ghost" style="font-size:.8rem;padding:.35rem .85rem">Docs</a>
      <a href="dashboard.html" class="btn btn--ghost" style="font-size:.8rem;padding:.35rem .85rem">Dashboard</a>
      <button class="lang-toggle" data-lang="en">EN</button>
      <button class="lang-toggle" data-lang="de">DE</button>
    </div>
  </header>

  <main class="main">
    <section class="hero">
      <div class="hero__content">
        <h1 id="hero-title" class="lang-fade"></h1>
        <p id="hero-sub" class="lang-fade"></p>
        <div class="hero__buttons">
          <a id="btn-invite" href="https://discord.com/oauth2/authorize?client_id=1484653109576732692&permissions=8&scope=bot%20applications.commands" class="btn btn--primary lang-fade"></a>
          <a id="btn-commands" href="#features" class="btn btn--ghost lang-fade"></a>
          <a href="dashboard.html" class="btn btn--ghost">Dashboard</a>
          <a href="https://github.com/developer51709/Niko" class="btn btn--ghost" target="_blank" rel="noopener noreferrer">GitHub</a>
        </div>
        <!-- Live stats bar -->
        <div id="stats-bar" style="display:flex;gap:1.4rem;margin-top:1.2rem;font-size:.78rem;color:var(--muted);flex-wrap:wrap"></div>
      </div>
      <div class="hero__art">
        <img src="coffee.svg" alt="Coffee cup" class="coffee-svg" />
      </div>
    </section>

    <section id="features" class="section section--cards">
      <h2 id="features-title" class="lang-fade"></h2>
      <div class="cards">
        <article class="card">
          <h3 id="feat-personality-title" class="lang-fade"></h3>
          <p id="feat-personality-text" class="lang-fade"></p>
        </article>
        <article class="card">
          <h3 id="feat-music-title" class="lang-fade"></h3>
          <p id="feat-music-text" class="lang-fade"></p>
        </article>
        <article class="card">
          <h3 id="feat-level-title" class="lang-fade"></h3>
          <p id="feat-level-text" class="lang-fade"></p>
        </article>
        <article class="card">
          <h3 id="feat-fun-title" class="lang-fade"></h3>
          <p id="feat-fun-text" class="lang-fade"></p>
        </article>
      </div>
    </section>

    <section class="section section--split">
      <div class="split__block">
        <h2 id="personality-title" class="lang-fade"></h2>
        <p id="personality-text" class="lang-fade"></p>
        <ul class="pill-list">
          <li>normal 🫗</li>
          <li>café ☕</li>
        </ul>
      </div>
      <div class="split__block">
        <h2 id="bilingual-title" class="lang-fade"></h2>
        <div class="example-card">
          <div>
            <h4>EN</h4>
            <p>“brewing your track bestie ☕🎶”</p>
          </div>
          <div>
            <h4>DE</h4>
            <p>„brühe deinen track auf liebchen ☕🎶“</p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div>
      <span id="footer-text" class="lang-fade"></span>
    </div>
    <nav class="footer__nav">
      <a href="tos.html" id="nav-tos" class="link--transition lang-fade">ToS</a>
      <a href="privacy.html" id="nav-privacy" class="link--transition lang-fade">Privacy</a>
    </nav>
  </footer>

  <script src="script.js"></script>
  <script>
    // Fetch live bot stats and populate the stats bar
    fetch('/api/botstats').then(r => r.json()).then(s => {
      const bar = document.getElementById('stats-bar');
      if (!bar) return;
      const items = [
        { label: 'servers', value: s.guild_count },
        { label: 'users',   value: s.user_count  },
        { label: 'commands',value: s.command_count },
      ];
      bar.innerHTML = items.filter(i => i.value).map(i =>
        `<span style="display:flex;align-items:center;gap:.3rem">
           <span style="color:var(--accent);font-weight:600">${Number(i.value).toLocaleString()}</span>
           ${i.label}
         </span>`
      ).join('<span style="opacity:.25">·</span>');
    }).catch(() => {});
  </script>
</body>
</html>
